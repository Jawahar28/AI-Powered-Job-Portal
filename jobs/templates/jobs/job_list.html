{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h1 class="mb-4 text-center">
        Available Jobs
    </h1>

    {% for job in jobs %}

    <div class="card mb-4 shadow-sm">

        <div class="card-body">

            <h3 class="card-title">
                {{ job.title }}
            </h3>

            <h6 class="card-subtitle mb-3 text-muted">
                {{ job.company.name }}
            </h6>

            {% if job.company %}
                <p class="card-text">
                    ✅ Company Available
                </p>
            {% endif %}

            <a href="{% url 'job_detail' job.id %}" class="btn btn-primary">
                View Details
            </a>

        </div>

    </div>

    {% empty %}

        <div class="alert alert-warning">
            No jobs available.
        </div>

    {% endfor %}

</div>

{% endblock %}
