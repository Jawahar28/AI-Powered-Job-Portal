{% extends "base.html" %}

{% block content %}


    {% for job in jobs %}
        <hr>

        <h2>{{ job.title|title }}</h2>

        <p><strong>Company:</strong> {{ job.company.name }}</p>

        {% if job.company %}
            <p> Company Available </p>
        {% endif %}

</hr>
        {% empty %}
        <h2> No Jobs Available </h2>
    


    {% endfor %}

{% endblock %}
